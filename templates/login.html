{% extends 'base.html' %}

{% block title %}登录{% endblock %}

{% block content %}
<div class="form-container">
  <h2 class="section-title">登录</h2>
  <form method="post">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="form-error" style="margin-bottom:1rem;">{{ form.non_field_errors }}</div>
    {% endif %}
    <div class="form-group">
      <label for="{{ form.username.id_for_label }}">用户名</label>
      {{ form.username }}
    </div>
    <div class="form-group">
      <label for="{{ form.password.id_for_label }}">密码</label>
      {{ form.password }}
    </div>
    <button type="submit" class="btn-primary">登录</button>
  </form>
  <p style="margin-top:1rem;color:#888;text-align:center;">
    还没有账号？<a href="{% url 'register' %}" style="color:#4a6cf7;">立即注册</a>
  </p>
</div>
{% endblock %}
