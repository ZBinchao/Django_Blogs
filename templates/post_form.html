{% extends 'base.html' %}

{% block title %}{{ action }}博文{% endblock %}

{% block content %}
<div class="form-container" style="max-width:700px;">
  <h2 class="section-title">{{ action }}博文</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label for="{{ form.post_type.id_for_label }}">类型</label>
      {{ form.post_type }}
    </div>
    <div class="form-group">
      <label for="{{ form.title.id_for_label }}">标题</label>
      {{ form.title }}
    </div>
    <div class="form-group">
      <label for="{{ form.content.id_for_label }}">内容</label>
      {{ form.content }}
    </div>
    <div class="form-group">
      <label for="{{ form.cover.id_for_label }}">封面图</label>
      {{ form.cover }}
    </div>
    <button type="submit" class="btn-primary">保存</button>
    <a href="javascript:history.back()" class="btn-outline" style="margin-left:0.5rem;">取消</a>
  </form>
</div>
{% endblock %}
