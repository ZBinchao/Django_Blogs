{% extends 'base.html' %}

{% block title %}删除相册{% endblock %}

{% block content %}
<div class="confirm-box">
  <h2>确认删除</h2>
  <p>确定要删除相册 "<strong>{{ album.title }}</strong>" 吗？其中的所有照片也会被删除。此操作不可撤销。</p>
  <div class="confirm-actions">
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-danger">确认删除</button>
    </form>
    <a href="{% url 'album_detail' album.id %}" class="btn-outline">取消</a>
  </div>
</div>
{% endblock %}
